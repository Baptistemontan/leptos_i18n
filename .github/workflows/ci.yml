name: Tests

on:
  push:
    branches: [master, next]
  pull_request:
    branches: [master, next]

env:
  CARGO_TERM_COLOR: always

jobs:
  ########################################
  # BOOTSTRAP (runs once)
  ########################################

  bootstrap:
    name: Bootstrap toolchain & deps
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust tools
        run: |
          cargo install cargo-leptos --locked
          cargo install trunk --locked
          cargo install cargo-all-features

      - name: Pre-build workspace
        run: cargo build --workspace --locked

      - name: Archive environment
        run: |
          tar -czf ci-env.tar.gz ~/.cargo target

      - name: Upload environment
        uses: actions/upload-artifact@v4
        with:
          name: ci-env
          path: ci-env.tar.gz

  ########################################
  # LIB TEST
  ########################################

  lib_test:
    needs: bootstrap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-ci

      - name: Run clippy
        working-directory: leptos_i18n
        run: cargo all-features clippy

      - name: Test all features
        working-directory: leptos_i18n
        run: cargo all-features test

      - name: Check format
        run: cargo fmt --check

  ########################################
  # SSR EXAMPLES
  ########################################

  test_ssr_examples:
    needs: bootstrap
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        examples:
          [
            hello_world_actix,
            hello_world_axum,
            workspace,
            axum_island,
            routing_ssr,
          ]

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-ci

      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm

      - name: Build example
        working-directory: examples/ssr/${{ matrix.examples }}
        run: cargo leptos build

      - name: Install e2e deps
        working-directory: examples/ssr/${{ matrix.examples }}
        run: |
          npm install
          npx playwright install --with-deps

      - name: Run e2e
        id: e2e
        working-directory: examples/ssr/${{ matrix.examples }}
        run: npx playwright test

      - name: Upload e2e report
        if: ${{ steps.e2e.outcome == 'failure' && !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-${{ matrix.examples }}
          path: examples/ssr/${{ matrix.examples }}/playwright-report/

  ########################################
  # DYNAMIC SSR EXAMPLES
  ########################################

  test_ssr_dyn_load_examples:
    needs: bootstrap
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        examples: [hello_world_actix, hello_world_axum, axum_island, namespaces]

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-ci

      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm

      - name: Build example
        working-directory: examples/dynamic_load/${{ matrix.examples }}
        run: cargo leptos build

      - name: Install e2e deps
        working-directory: examples/dynamic_load/${{ matrix.examples }}
        run: |
          npm install
          npx playwright install --with-deps

      - name: Run e2e
        run: npx playwright test
        working-directory: examples/dynamic_load/${{ matrix.examples }}

  ########################################
  # CSR EXAMPLES
  ########################################

  test_csr_examples:
    needs: bootstrap
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        examples:
          [
            counter,
            counter_icu_datagen,
            counter_plurals,
            interpolation,
            namespaces,
            subkeys,
            yaml,
            routing_csr,
            subcontext,
            custom_formatter,
          ]

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-ci

      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm

      - name: Build example
        working-directory: examples/csr/${{ matrix.examples }}
        run: trunk build

      - name: Install e2e deps
        working-directory: examples/csr/${{ matrix.examples }}
        run: |
          npm install
          npx playwright install --with-deps

      - name: Run e2e
        run: npx playwright test
        working-directory: examples/csr/${{ matrix.examples }}

  ########################################
  # TEST SUITES
  ########################################

  test_suite:
    needs: bootstrap
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        tests_suites: [json, json5, yaml, toml, namespaces]

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-ci

      - name: Run test suite
        working-directory: tests/${{ matrix.tests_suites }}
        run: cargo test
