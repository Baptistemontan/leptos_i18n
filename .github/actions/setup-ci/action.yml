name: Setup CI Environment
description: Install Rust, Node, cache dependencies, install cargo binaries, and cache Playwright

inputs:
  rust_toolchain:
    description: Rust toolchain to install (stable/nightly)
    required: false
    default: "stable"
  node_version:
    description: Node version to install
    required: false
    default: 18
  example_path:
    description: Path to example (for npm/node_modules cache)
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.rust_toolchain }}
        components: clippy, rustfmt
        targets: wasm32-unknown-unknown

    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ~/.cargo/bin
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ inputs.rust_toolchain }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Install cargo-leptos
      shell: bash
      run: |
        if ! command -v cargo-leptos >/dev/null; then
          cargo install cargo-leptos --locked
        fi

    - name: Install trunk
      shell: bash
      run: |
        if ! command -v trunk >/dev/null; then
          cargo install trunk --locked
        fi

    - name: Install cargo-all-features
      shell: bash
      run: |
        if ! command -v cargo-all-features >/dev/null; then
          cargo install cargo-all-features --locked
        fi

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node_version }}

    - name: Build e2e utils
      shell: bash
      working-directory: examples/utils
      run: npm install

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-browsers

    # - name: Cache node_modules (optional)
    #   if: ${{ inputs.example_path != '' }}
    #   uses: actions/cache@v4
    #   with:
    #     path: ${{ inputs.example_path }}/node_modules
    #     key: ${{ runner.os }}-npm-${{ inputs.example_path }}-${{ hashFiles('${{ inputs.example_path }}/package-lock.json') }}
    #     restore-keys: |
    #       ${{ runner.os }}-npm-${{ inputs.example_path }}-

    - name: Install Playwright
      if: ${{ inputs.example_path != '' }}
      shell: bash
      working-directory: inputs.example_path
      run: |
        npm install
        npx playwright install --with-deps
